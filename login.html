<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./login.css" />
    <title>Ingreso Tec</title>
  </head>
  <body>
    <div class="container">

      <!-- Sección Izquierda (Formulario) -->
      <div class="left-section">
        <div class="form-wrapper">
          <!-- Encabezado -->
          <div class="header">
            <h1>Ingresa a tu cuenta Tec</h1>
            <p>Introduce tu email y contraseña para ingresar</p>
          </div>

          <!-- Botón "Continuar con el Tec" -->
          <div class="tec-login-button">
            <button class="continue-with-tec">
              <img src="images/itesm.svg" alt="logo Tec" />
              Continuar con el Tec
            </button>
          </div>

          <!-- Separador -->
          <div class="separator">
            <span>O ingresar con</span>
          </div>

          <!-- Campos de formulario -->
          <div class="inputs">
            <!-- Correo -->
            <label for="email">
              correo electrónico <span>*</span>
            </label>
            <div class="input-container">
              <input
                type="email"
                id="email"
                placeholder="matricula@tec.mx"
              />
            </div>

            <!-- Contraseña -->
            <label for="password">
              contraseña <span>*</span>
            </label>
            <div class="input-container password-container">
              <input
                type="password"
                id="password"
                placeholder="Contraseña"
              />
              <!-- Ícono de ojo (por defecto off_eye.svg; cambia a eye.svg si lo “activas”) -->
              <img
                src="images/off_eye.svg"
                alt="eye icon"
                class="eye-icon"
              />
            </div>

            <!-- Recuérdame + ¿No puedes acceder? -->
            <div class="extras-row">
              <div class="remember-me">
                <input type="checkbox" id="rememberCheckbox" />
                <label for="rememberCheckbox">Recuérdame</label>
              </div>
              <div class="help-links">
                <span>¿No puedes acceder?</span>
                <a href="#" class="contact-link">Contacta a un moderador Tec</a>
              </div>
            </div>

            <!-- Botón "Sign In" -->
            <button class="sign-in-btn">Autenticar</button>
          </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
          <span>© 2025 TecDoIt. Todos los derechos reservados.</span>
        </footer>
      </div>

      <!-- Sección Derecha (Fondo + Logo grande) -->
      <div class="right-section">
        <!-- Fondo con degradado -->
        <img
          src="images/background.png"
          alt="Fondo TecDoIt"
          class="bg-image"
        />

        <!-- Logo + Texto "Tec DoIt" -->
        <div class="brand-logo">
          <!-- Usa el mismo itesm.svg, pero con filtro para verse blanco -->
          <img
            src="images/itesm.svg"
            alt="ITESM Logo"
            class="itesm-white"
          />
          <!-- "Tec" normal y "DoIt" en bold -->
          <h2>
            <strong>Tec</strong>DoIt
          </h2>
        </div>
      </div>

      <!-- Ícono luna (Dark/Light) abajo a la derecha -->
      <img
        src="images/moon.svg"
        alt="Modo oscuro/claro"
        class="moon-icon"
      />
    </div>
  </body>
</html>
