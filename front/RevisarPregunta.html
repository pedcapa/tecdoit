    <style>
        /* Custom styles for the DM Sans and Poppins fonts, and overall layout */
        body {
            font-family: 'DM Sans', sans-serif; /* Primary font from original CSS */
            background-color: #f4f7fe; /* Background color from original CSS */
            margin: 0;
            display: flex; /* Use flexbox for the main layout */
            min-height: 100vh;
            overflow-x: hidden; /* Prevent horizontal scroll during transitions */
            color: #707eae; /* Default text color from original CSS */
            font-size: 0.875rem; /* Base font size, 14px */
        }

        /* Active link styling for sidebar */
        .active-link {
            background-color: #e0f2fe; /* Light blue background for active state */
            color: #1d4ed8; /* Darker blue text color */
            border-radius: 0.5rem; /* Rounded corners */
        }

        /* Custom transition for sidebar and main content */
        .sidebar-transition {
            transition: transform 0.3s ease-in-out;
        }

        .main-content-transition {
            transition: margin-left 0.3s ease-in-out;
        }

        /* Specific styles from VerPreguntaSimple.module.css adapted or recreated */

            background-color: #f4f7fe; /* Match body background */
            padding: 10px;
        }

        .preview-circle {
            border-radius: 15px; /* Rounded corners for the preview button */
            background-color: #8097ce; /* Blue background */
            border: 2px solid #454d60; /* Darker border */
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .preview-circle:hover {
            opacity: 1;
        }

        /* Styling for the main question and options container */
        .board-container {
            border: 2px solid #8e99b5; /* Border from TSX */
            border-radius: 8px; /* Rounded corners */
            overflow: hidden;
            background-color: white; /* White background for the board */
        }

        /* Styles for the review settings panel */
        .review-settings-panel {
            border: 2px solid #8e99b5;
            border-radius: 20px;
            background-color: #e8ecf6; /* Light gray background */
            padding: 11px 10px;
        }

        .comment-textarea {
            width: 100%;
            height: 120px; /* Adjust height as needed */
            border: 1px solid #8097ce; /* Border color from TSX */
            border-radius: 5px;
            padding: 10px;
            resize: vertical; /* Allow vertical resizing */
            background-color: #f8faff; /* Light background for textarea */
        }

        .btn-action-green {
            border-radius: 15px;
            background-color: #aae3ac; /* Light green for accept */
            border: 3px solid #8097ce;
            padding: 8px 15px;
            font-size: 15px;
            font-weight: 600;
            color: #0023a5; /* Blue text */
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-action-green:hover {
            background-color: #8fd292;
        }

        .btn-action-red {
            border-radius: 15px;
            background-color: rgba(255, 77, 77, 0.4); /* Light red for reject */
            border: 3px solid #8097ce;
            padding: 8px 15px;
            font-size: 15px;
            font-weight: 600;
            color: #0023a5; /* Blue text */
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-action-red:hover {
            background-color: rgba(255, 77, 77, 0.6);
        }

    <script>
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const sidebarToggle = document.getElementById('sidebarToggle');
        let isSidebarOpen = true; // Initial state

        function toggleSidebar() {
            if (isSidebarOpen) {
                // Hide sidebar: move it off-screen to the left
                sidebar.style.transform = 'translateX(-100%)';
                // Adjust main content margin to take full width
                mainContent.style.marginLeft = '0';
            } else {
                // Show sidebar: move it back to its original position
                sidebar.style.transform = 'translateX(0)';
                // Adjust main content margin back to original
                mainContent.style.marginLeft = '16rem'; /* Corresponds to w-64 (16rem) */
            }
            isSidebarOpen = !isSidebarOpen;
        }

        // Add event listener to the toggle button
        sidebarToggle.addEventListener('click', toggleSidebar);

        // Adjust layout on window load and resize for initial state and responsiveness
        function adjustLayoutForScreenSize() {
            if (window.innerWidth < 1024) { // Adjusted breakpoint for medium screens (lg: from Tailwind)
                if (isSidebarOpen) {
                    toggleSidebar(); // Hide sidebar by default on smaller screens
                }
            } else { // For larger screens (desktop)
                if (!isSidebarOpen) {
                    toggleSidebar(); // Ensure sidebar is visible by default on larger screens
                }
            }
        }

        // Call the adjustment function on load and resize
        window.addEventListener('load', adjustLayoutForScreenSize);
        window.addEventListener('resize', adjustLayoutForScreenSize);
    </script>
