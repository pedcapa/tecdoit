<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./index.css" />
    <title>Ingreso Tec</title>
  </head>
  <body>
    <div class="container">

      <!-- Sección Izquierda (Formulario) -->
      <div class="left-section">
        <div class="form-wrapper">
          <!-- Encabezado -->
          <div class="header">
            <h1>Ingresa a tu cuenta Tec</h1>
            <p>Introduce tu email y contraseña para ingresar</p>
          </div>

          <!-- Botón "Continuar con el Tec" -->
          <div class="tec-login-button">
            <button class="continue-with-tec">
              <img src="images/itesm.svg" alt="logo Tec" />
              Continuar con el Tec
            </button>
          </div>

          <!-- Separador -->
          <div class="separator">
            <span>O ingresar con</span>
          </div>

          <!-- Campos de formulario -->
          <div class="inputs">
            <!-- Correo -->
            <label for="email">
              Correo Electrónico <span>*</span>
            </label>
            <div class="input-container">
              <input
                type="email"
                id="email"
                placeholder="AXXXXXXX@tec.mx"
              />
            </div>

            <!-- Contraseña -->
            <label for="password">
              Contraseña <span>*</span>
            </label>
            <div class="input-container password-container">
              <input
                type="password"
                id="password"
                placeholder="********"
              />
              <!-- Ícono de ojo: al hacer clic se cambia el placeholder y el tipo -->
              <img
                src="images/hidden_eye.svg"
                alt="eye icon"
                class="eye-icon"
                id="togglePassword"
              />
            </div>

            <!-- Recuérdame + ¿No puedes acceder? -->
            <div class="extras-row">
              <div class="remember-me">
                <!-- Checkbox basado en imagen -->
                <img
                  src="images/uncheckedbox.svg"
                  alt="checkbox"
                  class="checkbox-icon"
                  id="rememberCheckboxIcon"
                />
                <label class="remember-label">Recuérdame</label>
              </div>
              <div class="help-links">
                <span>¿No puedes acceder?</span>
                <a href="#" class="contact-link"><u>Contacta a un moderador Tec</u></a>
              </div>
            </div>

            <!-- Botón "Autenticar" -->
            <button class="sign-in-btn">Autenticar</button>
          </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
          <span>© 2025 TecDoIt. Todos los derechos reservados.</span>
        </footer>
      </div>

      <!-- Sección Derecha (Fondo + Logo grande) -->
      <div class="right-section">
        <!-- Fondo -->
        <img
          src="images/background.png"
          alt="Fondo TecDoIt"
          class="bg-image"
        />

        <!-- Logo + Texto "TecDoIt" -->
        <div class="brand-logo">
          <img
            src="images/itesm.svg"
            alt="ITESM Logo"
            class="itesm-white"
          />
          <h2>
            <strong>Tec</strong>DoIt
          </h2>
        </div>
      </div>

      <!-- Ícono luna (Modo oscuro) -->
      <img
        src="images/moon.svg"
        alt="Modo oscuro/claro"
        class="moon-icon"
      />
    </div>

    <!-- Script para manejar el toggle del ojo y del checkbox -->
    <script>
      // Toggle para mostrar/ocultar contraseña y cambiar placeholder
      const passwordInput = document.getElementById('password');
      const togglePasswordIcon = document.getElementById('togglePassword');
      let isPasswordVisible = false;

      togglePasswordIcon.addEventListener('click', () => {
        isPasswordVisible = !isPasswordVisible;
        if (isPasswordVisible) {
          // Ojo abierto: mostrar contraseña en texto claro y placeholder "Contraseña"
          passwordInput.type = 'text';
          passwordInput.placeholder = 'Contraseña';
          togglePasswordIcon.src = 'images/off_eye.svg';
        } else {
          // Ojo cerrado: ocultar contraseña y placeholder "********"
          passwordInput.type = 'password';
          passwordInput.placeholder = '********';
          togglePasswordIcon.src = 'images/hidden_eye.svg';
        }
      });

      // Toggle para checkbox "Recuérdame"
      const rememberCheckboxIcon = document.getElementById('rememberCheckboxIcon');
      let isRememberChecked = false;

      rememberCheckboxIcon.addEventListener('click', () => {
        isRememberChecked = !isRememberChecked;
        if (isRememberChecked) {
          rememberCheckboxIcon.src = 'images/checkedbox.svg';
        } else {
          rememberCheckboxIcon.src = 'images/uncheckedbox.svg';
        }
      });
    </script>
  </body>
</html>
